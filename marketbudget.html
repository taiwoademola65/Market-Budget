<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Market Budget</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <h2 class="text-center text-light p-2 shadow bg-dark">Market Budget</h2>

  <div class="container-fluid mt-3">
    <label class="mb-2" for="budgetInput">Set Budget in Naira (N)</label>
    <input id="budgetInput" type="number" class="form-control w-25 mb-3">
    <button class="btn btn-dark" onclick="setBudget()">Set Budget</button>
    <p class="mt-2 p-2 w-25 fw-semibold bg-success shadow text-light rounded-3 border" id="budgetDisplay" style="display: block;">
      Budget (N) = 0</p>

  </div>

  <div class="container-fluid mb-3 ">
    <label class="mb-2">Item Name</label>
    <input type="text" id="itemName" class="form-control mb-2 w-25" placeholder="e.g Rice">
    <label class="mb-2">Price (N)</label>
    <input type="number" id="itemPrice" class="form-control mb-2 w-25" placeholder="e.g 5000">
    <button class="btn btn-dark" onclick="addItem()">Add Item</button>
  </div>

  <div class="container-fluid mt-4">
    <h4 class="text-dark">Item List</h4>
    <ul id="itemList" class="list-group w-50">
      </ul>
  </div>

  <script>
    let marketBudgets = 0
    let items = []

    const setBudget = () => {
      let budget = budgetInput.value;
      budgetInput.value = '';
      if (budget === '' || budget <= 0) {
        alert('enter a valid budget amount')
        return
      }

      marketBudgets = parseFloat(budget)
      document.getElementById('budgetDisplay').textContent = 'Budget: ₦' + marketBudgets

      // document.getElementById('budgetDisplay').style.display = 'block'
      // budgetDisplay.textContent = 'Budget: ₦' + totalBudget;
      // budgetDisplay = `N ${totalBudget}`

    }

    const addItem = () => {
      let item = itemName.value;
      let itemPrice = parseFloat(document.getElementById('itemPrice').value);
      
      if (item === '' || itemPrice <= 0) {
        alert('Enter a valid item name and price')
        return
      }
      if (itemPrice <= marketBudgets) {
        items.push({name: item, price: itemPrice})

        marketBudgets = marketBudgets - itemPrice

        updateBudgetDisplay();
        displayItems();

        itemName.value = '';
        document.getElementById('itemPrice').value = '';
      }else{
        alert('Insufficient budget to buy this item!')
      }
    }

    // Helper function to update the budget text
    const updateBudgetDisplay = () => {
      document.getElementById('budgetDisplay').textContent = 'Budget: ₦' + marketBudgets.toLocaleString();
    };

    const displayItems = () =>{
      let itemList = '';
      for (let i = 0; i < items.length; i++) {
        let detail = items[i];
        itemList += `<li class="list-group-item d-flex justify-content-between align-items-center">
            ${detail.name} 
            <span class="badge bg-success rounded">₦${detail.price.toLocaleString()}</span>
          </li>`;

        
      }
      document.getElementById('itemList').innerHTML = itemList;
    }

  </script>
</body>

</html>
