<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Market Budget</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <h2 class="text-center text-light p-2 shadow bg-dark">Market Budget</h2>

  <div class="container-fluid mt-3">
    <label class="mb-2" for="budgetInput">Set Budget in Naira (N)</label>
    <input id="budgetInput" type="number" class="form-control w-25 mb-3">
    <button class="btn btn-dark" onclick="setBudget()">Set Budget</button>
    <p class="mt-2 p-2 w-25 fw-semibold bg-success shadow text-light rounded-3 border" id="budgetDisplay" style="display: block;">
      Budget (N) = 0</p>
  </div>
  <div class="container-fluid mb-3 ">
    <label class="mb-2">Item Name</label>
    <input type="text" id="itemName" class="form-control mb-2 w-25" placeholder="e.g Rice">
    <label class="mb-2">Price (N)</label>
    <input type="number" id="itemPrice" class="form-control mb-2 w-25" placeholder="e.g 5000">
    <button class="btn btn-dark" onclick="addItem()">Add Item</button>
  </div>

  <div class="container-fluid mt-4">
    <h4 class="text-dark">Item List</h4>
    <ul id="itemList" class="list-group w-50">
      </ul>
  </div>

  <script src="script.js">

  </script>
</body>

</html>
